name: MovieFlix ETL Pipeline

on:
  workflow_dispatch:

jobs:
  etl:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moviesdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar pasta data
        run: mkdir -p data

      - name: Rodar Extração
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: python ./extract/extract-pipeline.py

      - name: Aguardar banco iniciar
        run: sleep 10

      - name: Rodar Load
        run: python load/load-to-db.py

      - name: Salvar CSVs como Artefatos
        uses: actions/upload-artifact@v4
        with:
          name: movieflix-data
          path: data/