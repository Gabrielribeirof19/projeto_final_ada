name: MovieFlix ETL Pipeline

on:
  workflow_dispatch:

jobs:
  etl:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moviesdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Extract
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: python extract/extract-pipeline.py

      - name: Wait database
        run: sleep 10

      - name: Run Load
        run: python load/load-to-db.py